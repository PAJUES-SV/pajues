<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파주ES SV 퀴즈 | 1회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/nanumsquare.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#0D7A55;
  --mint:#00B894;
  --mint-light:#E6F7F3;
  --white:#ffffff;
  --bg:#F8FAF9;
  --text:#1A1A1A;
  --sub:#555;
  --gray:#AAA;
  --border:#C8E6DC;
  --red:#E53E3E;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── 헤더 ── */
.header{background:var(--green);padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
.header-logo{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:16px;color:#fff}
.header-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px}
.header-badge{background:var(--mint);color:#fff;font-family:'NanumSquare',sans-serif;font-weight:800;font-size:11px;padding:5px 12px;border-radius:20px}

/* ── 탭 ── */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.tab{flex:1;padding:14px;font-family:'NanumSquare',sans-serif;font-weight:700;font-size:13px;text-align:center;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

/* ── 페이지 ── */
.page{display:none;max-width:640px;margin:0 auto;padding:24px 20px 80px}
.page.active{display:block}

/* ── 닉네임 입력 ── */
.nick-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:28px 24px;text-align:center;margin-bottom:20px}
.nick-card h2{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:18px;color:var(--text);margin-bottom:6px}
.nick-card p{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.6}
.nick-input-wrap{display:flex;gap:10px}
.nick-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border 0.2s}
.nick-input:focus{border-color:var(--mint)}
.nick-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-family:'NanumSquare',sans-serif;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;transition:opacity 0.2s}
.nick-btn:hover{opacity:0.85}

/* ── 퀴즈 진행 ── */
.quiz-wrap{display:none}
.quiz-wrap.active{display:block}

.progress-bar-wrap{background:#e8e8e8;border-radius:10px;height:6px;margin-bottom:20px;overflow:hidden}
.progress-bar{background:linear-gradient(90deg,var(--green),var(--mint));height:100%;border-radius:10px;transition:width 0.4s ease}

.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.q-num{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:12px;color:var(--mint)}
.q-timer{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:13px;color:var(--sub)}
.q-timer.urgent{color:var(--red)}

.q-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px}
.q-text{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:15px;color:var(--text);line-height:1.55}

.options{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.option{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;cursor:pointer;font-size:13.5px;color:var(--text);display:flex;align-items:center;gap:12px;transition:all 0.15s;text-align:left}
.option:hover{border-color:var(--mint);background:var(--mint-light)}
.option.selected{border-color:var(--mint);background:var(--mint-light)}
.option.correct{border-color:var(--green);background:#E6F7F3;color:var(--green)}
.option.wrong{border-color:var(--red);background:#FEF2F2;color:var(--red)}
.option-num{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'NanumSquare',sans-serif;font-weight:800;font-size:11px;flex-shrink:0}
.option.selected .option-num{background:var(--mint);border-color:var(--mint);color:#fff}
.option.correct .option-num{background:var(--green);border-color:var(--green);color:#fff}
.option.wrong .option-num{background:var(--red);border-color:var(--red);color:#fff}

.next-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:15px;font-family:'NanumSquare',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:opacity 0.2s;display:none}
.next-btn:hover{opacity:0.85}
.next-btn.show{display:block}

/* ── 결과 ── */
.result-wrap{display:none;text-align:center}
.result-wrap.active{display:block}
.result-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:32px 24px;margin-bottom:16px}
.result-icon{font-size:48px;margin-bottom:12px}
.result-nick{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:14px;color:var(--sub);margin-bottom:4px}
.result-score{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:48px;color:var(--green);margin-bottom:4px}
.result-score span{font-size:20px;color:var(--sub)}
.result-time{font-size:13px;color:var(--gray);margin-bottom:20px}
.result-detail{display:flex;gap:10px;justify-content:center}
.result-pill{background:var(--mint-light);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-family:'NanumSquare',sans-serif;font-weight:700;font-size:12px;color:var(--green)}
.result-msg{font-size:13px;color:var(--sub);margin-top:16px;line-height:1.6}
.already-msg{background:#FEF2F2;border:1px solid #FED7D7;border-radius:12px;padding:16px;font-size:13px;color:var(--red);margin-bottom:16px;font-family:'NanumSquare',sans-serif;font-weight:700}

/* ── 랭킹 ── */
.rank-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.rank-title{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:16px;color:var(--text)}
.rank-round{font-size:12px;color:var(--gray)}
.rank-tabs{display:flex;gap:8px;margin-bottom:16px}
.rank-tab{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:'NanumSquare',sans-serif;font-weight:700;font-size:12px;color:var(--sub);cursor:pointer;transition:all 0.15s}
.rank-tab.active{background:var(--green);color:#fff;border-color:var(--green)}

.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-item{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.rank-item.top1{border-color:#F6AD55;background:#FFFAF0}
.rank-item.top2{border-color:#CBD5E0;background:#F7FAFC}
.rank-item.top3{border-color:#C6A87D;background:#FAF5EB}
.rank-pos{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:18px;width:32px;text-align:center;color:var(--gray)}
.rank-item.top1 .rank-pos{color:#D69E2E}
.rank-item.top2 .rank-pos{color:#718096}
.rank-item.top3 .rank-pos{color:#9C6B2E}
.rank-medal{font-size:20px;width:28px;text-align:center}
.rank-info{flex:1}
.rank-name{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:14px;color:var(--text)}
.rank-rounds{font-size:11px;color:var(--gray);margin-top:2px}
.rank-score{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:16px;color:var(--green);text-align:right}
.rank-score small{font-size:11px;color:var(--gray);font-weight:400;display:block}
.rank-loading{text-align:center;padding:40px;color:var(--gray);font-size:13px}
.rank-empty{text-align:center;padding:40px;color:var(--gray);font-size:13px}

/* ── 공통 ── */
.section-title{font-family:'NanumSquare',sans-serif;font-weight:800;font-size:13px;color:var(--sub);margin-bottom:10px;letter-spacing:0.05em}
.divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="switchTab('quiz')">퀴즈 참여</button>
  <button class="tab" onclick="switchTab('rank')">랭킹</button>
</div>

<!-- ══ 퀴즈 탭 ══ -->
<div class="page active" id="tab-quiz">

  <!-- 닉네임 입력 -->
  <div id="nick-section">
    <div style="height:16px"></div>
    <div class="nick-card">
      <h2>닉네임을 입력해주세요</h2>
      <p>동일한 닉네임으로 1회만 참여할 수 있어요.<br>랭킹에 표시되므로 고정 닉네임을 사용해주세요.</p>
      <div class="nick-input-wrap">
        <input class="nick-input" id="nickInput" type="text" placeholder="예) 홍길동" maxlength="10">
        <button class="nick-btn" onclick="startQuiz()">시작</button>
      </div>
      <div id="nick-error" style="color:var(--red);font-size:12px;margin-top:10px;display:none"></div>
    </div>
    <div style="background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 20px">
      <div class="section-title">안내사항</div>
      <div style="font-size:12.5px;color:var(--sub);line-height:1.8">
        · 문제당 10점, 총 3문제 (최대 30점)<br>
        · 동일 닉네임으로 이번 회차 재참여 불가<br>
        · 누적 점수로 최종 랭킹 결정<br>
        · 동점 시 풀이시간이 짧은 순으로 순위 결정
      </div>
    </div>
  </div>

  <!-- 퀴즈 진행 -->
  <div class="quiz-wrap" id="quiz-section">
    <div style="height:16px"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:33%"></div>
    </div>
    <div class="q-header">
      <div class="q-num" id="qNum">문제 1 / 3</div>
      <div class="q-timer" id="qTimer">⏱ 0초</div>
    </div>
    <div class="q-card">
      <div class="q-text" id="qText"></div>
    </div>
    <div class="options" id="optionsList"></div>
    <div style="height:14px"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
  </div>

  <!-- 결과 -->
  <div class="result-wrap" id="result-section">
    <div style="height:16px"></div>
    <div id="already-banner" class="already-msg" style="display:none">
      이미 이번 회차에 참여하셨습니다. 다음 회차를 기다려주세요!
    </div>
    <div class="result-card" id="result-card">
      <div class="result-icon" id="resultIcon">🎉</div>
      <div class="result-nick" id="resultNick"></div>
      <div class="result-score" id="resultScore">0<span>점</span></div>
      <div class="result-time" id="resultTime"></div>
      <div class="result-detail" id="resultDetail"></div>
      <div class="result-msg" id="resultMsg"></div>
    </div>
    <button style="width:100%;background:#fff;color:var(--green);border:1.5px solid var(--border);border-radius:12px;padding:14px;font-family:'NanumSquare',sans-serif;font-weight:800;font-size:13px;cursor:pointer;margin-bottom:10px" onclick="switchTab('rank')">랭킹 확인하기 →</button>
    <button style="width:100%;background:#fff;color:var(--sub);border:1.5px solid var(--border);border-radius:12px;padding:14px;font-family:'NanumSquare',sans-serif;font-weight:700;font-size:13px;cursor:pointer" onclick="resetQuiz()">처음으로</button>
  </div>
</div>

<!-- ══ 랭킹 탭 ══ -->
<div class="page" id="tab-rank">
  <div style="height:16px"></div>
  <div class="rank-header">
    <div class="rank-title">참여자 랭킹</div>
    <div class="rank-round">1회차 진행중</div>
  </div>
  <div class="rank-tabs">
    <button class="rank-tab active" onclick="loadRanking('total', this)">누적 랭킹</button>
    <button class="rank-tab" onclick="loadRanking('round', this)">이번 회차</button>
  </div>
  <div class="rank-list" id="rankList">
    <div class="rank-loading">랭킹을 불러오는 중...</div>
  </div>
</div>

<script>
// ══ 설정 ══════════════════════════════════════
const SUPABASE_URL = 'https://qacbzixkdonoghjdhsop.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhY2J6aXhrZG9ub2doamRoc29wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjc3MTEsImV4cCI6MjA5Mjg0MzcxMX0.jczYyDVNLLPbTigTAOYCODKdRMHQKJpHc8hLti8lV5U';
const CURRENT_ROUND = 2; // ← 매달 이 숫자만 바꾸면 됨

// ══ 문제 데이터 (매달 이 부분만 교체) ══════════
const QUESTIONS = [
  {
    text: "행복나눔반찬사업에서 반찬을 제조하고 배송하는 매장 이름은?",
    options: ['청춘찬찬찬', '청춘반찬', '파주클럽', '행복찬찬찬'],
    answer: 0 // 1번 - 청춘찬찬찬
  },
  {
    text: "2025년 신규 구성원은 몇 명일까요?",
    options: ['4명', '1명', '8명', '2명'],
    answer: 2 // 3번 - 8명
  },
  {
    text: "각 조직의 리더 주관으로 운영되며 구성원들의 업무상 윤리적 딜레마와 리스크 관리사례를 깊이 있게 토의하는 것은 무엇일까요?",
    options: ['윤리 Workshop', '윤리경영실천survey', '윤리실천Workshop', '윤리적딜레마 토의'],
    answer: 2 // 3번 - 윤리실천Workshop
  }
];

// ══ 상태 ══════════════════════════════════════
let currentQ = 0;
let score = 0;
let selectedOption = null;
let answered = false;
let nickname = '';
let startTime = null;
let elapsedSeconds = 0;
let timerInterval = null;
let results = []; // 각 문제 결과

// ══ Supabase 헬퍼 ══════════════════════════════
const supaFetch = async (path, opts={}) => {
  const res = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...(opts.headers||{})
    }
  });
  if (!res.ok && res.status !== 409) throw new Error(await res.text());
  return res;
};

// ══ 탭 전환 ══════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='quiz')||(i===1&&tab==='rank')));
  document.getElementById('tab-quiz').classList.toggle('active', tab==='quiz');
  document.getElementById('tab-rank').classList.toggle('active', tab==='rank');
  if (tab==='rank') loadRanking('total', document.querySelector('.rank-tab'));
}

// ══ 퀴즈 시작 ══════════════════════════════════
async function startQuiz() {
  const nick = document.getElementById('nickInput').value.trim();
  if (!nick) { showNickError('닉네임을 입력해주세요.'); return; }
  if (nick.length < 2) { showNickError('닉네임은 2자 이상 입력해주세요.'); return; }

  // 중복 참여 체크
  try {
    const res = await supaFetch(`/rest/v1/quiz_results?nickname=eq.${encodeURIComponent(nick)}&round=eq.${CURRENT_ROUND}&select=id`);
    const data = await res.json();
    if (data.length > 0) {
      nickname = nick;
      showAlreadyDone();
      return;
    }
  } catch(e) { console.error(e); }

  nickname = nick;
  currentQ = 0;
  score = 0;
  results = [];
  startTime = Date.now();
  elapsedSeconds = 0;
  startTimer();

  document.getElementById('nick-section').style.display = 'none';
  document.getElementById('quiz-section').classList.add('active');
  renderQuestion();
}

function showNickError(msg) {
  const el = document.getElementById('nick-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
    const el = document.getElementById('qTimer');
    el.textContent = `⏱ ${elapsedSeconds}초`;
    el.className = 'q-timer' + (elapsedSeconds > 60 ? ' urgent' : '');
  }, 500);
}

// ══ 문제 렌더링 ══════════════════════════════════
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  selectedOption = null;
  answered = false;

  document.getElementById('qNum').textContent = `문제 ${currentQ+1} / ${QUESTIONS.length}`;
  document.getElementById('progressBar').style.width = `${((currentQ+1)/QUESTIONS.length)*100}%`;
  document.getElementById('qText').textContent = `Q${currentQ+1}. ${q.text}`;
  document.getElementById('nextBtn').classList.remove('show');

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.onclick = () => selectOption(i, div);
    div.innerHTML = `<span class="option-num">${i+1}</span><span>${opt}</span>`;
    list.appendChild(div);
  });
}

function selectOption(idx, el) {
  if (answered) return;
  answered = true;
  selectedOption = idx;
  const q = QUESTIONS[currentQ];
  const options = document.querySelectorAll('.option');
  const isCorrect = idx === q.answer;

  options.forEach((o, i) => {
    if (i === q.answer) o.classList.add('correct');
    else if (i === idx && !isCorrect) o.classList.add('wrong');
  });

  if (isCorrect) score += 10;
  results.push({ correct: isCorrect });

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('show');
  nextBtn.textContent = currentQ < QUESTIONS.length - 1 ? '다음 문제 →' : '결과 보기 →';
}

function nextQuestion() {
  currentQ++;
  if (currentQ < QUESTIONS.length) {
    renderQuestion();
  } else {
    finishQuiz();
  }
}

// ══ 퀴즈 종료 ══════════════════════════════════
async function finishQuiz() {
  clearInterval(timerInterval);
  elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);

  document.getElementById('quiz-section').classList.remove('active');
  document.getElementById('result-section').classList.add('active');

  // Supabase 저장
  try {
    await supaFetch('/rest/v1/quiz_results', {
      method: 'POST',
      headers: { Prefer: 'return=minimal' },
      body: JSON.stringify({
        nickname,
        round: CURRENT_ROUND,
        score,
        elapsed_seconds: elapsedSeconds
      })
    });
  } catch(e) { console.error(e); }

  // 결과 표시
  const correctCount = results.filter(r=>r.correct).length;
  document.getElementById('resultNick').textContent = nickname + ' 님의 결과';
  document.getElementById('resultScore').innerHTML = `${score}<span>점</span>`;
  document.getElementById('resultTime').textContent = `풀이 시간: ${elapsedSeconds}초`;
  document.getElementById('resultDetail').innerHTML = `
    <div class="result-pill">정답 ${correctCount}/${QUESTIONS.length}문제</div>
    <div class="result-pill">1회차 참여 완료</div>
  `;

  let icon = '🎉', msg = '';
  if (score === 30) { icon = '🏆'; msg = '완벽해요! 만점입니다. 랭킹 상위권에 도전해보세요!'; }
  else if (score === 20) { icon = '👏'; msg = '좋아요! SV Brief를 더 꼼꼼히 읽으면 만점도 가능해요.'; }
  else if (score === 10) { icon = '💪'; msg = '다음 회차엔 SV Brief를 미리 읽고 도전해보세요!'; }
  else { icon = '📖'; msg = 'SV Brief를 읽으면 다음엔 더 잘 할 수 있어요!'; }

  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultMsg').textContent = msg;
}

function showAlreadyDone() {
  document.getElementById('nick-section').style.display = 'none';
  document.getElementById('result-section').classList.add('active');
  document.getElementById('already-banner').style.display = 'block';
  document.getElementById('result-card').style.display = 'none';
}

function resetQuiz() {
  document.getElementById('nick-section').style.display = 'block';
  document.getElementById('quiz-section').classList.remove('active');
  document.getElementById('result-section').classList.remove('active');
  document.getElementById('already-banner').style.display = 'none';
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('nickInput').value = '';
  document.getElementById('nick-error').style.display = 'none';
  clearInterval(timerInterval);
}

// ══ 랭킹 ══════════════════════════════════════
async function loadRanking(type, btnEl) {
  document.querySelectorAll('.rank-tab').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');

  const list = document.getElementById('rankList');
  list.innerHTML = '<div class="rank-loading">랭킹을 불러오는 중...</div>';

  try {
    let data;
    if (type === 'round') {
      // 이번 회차 랭킹
      const res = await supaFetch(`/rest/v1/quiz_results?round=eq.${CURRENT_ROUND}&select=nickname,score,elapsed_seconds&order=score.desc,elapsed_seconds.asc`);
      data = await res.json();
      renderRankList(data, false);
    } else {
      // 누적 랭킹: 닉네임별 합계
      const res = await supaFetch(`/rest/v1/quiz_results?select=nickname,score,elapsed_seconds,round`);
      const all = await res.json();

      // 닉네임별 누적 집계
      const map = {};
      all.forEach(r => {
        if (!map[r.nickname]) map[r.nickname] = { score:0, elapsed:0, rounds:0 };
        map[r.nickname].score += r.score;
        map[r.nickname].elapsed += r.elapsed_seconds;
        map[r.nickname].rounds++;
      });

      data = Object.entries(map)
        .map(([nickname, v]) => ({ nickname, score: v.score, elapsed_seconds: v.elapsed, rounds: v.rounds }))
        .sort((a,b) => b.score - a.score || a.elapsed_seconds - b.elapsed_seconds);

      renderRankList(data, true);
    }
  } catch(e) {
    list.innerHTML = '<div class="rank-empty">랭킹을 불러올 수 없습니다.</div>';
  }
}

function renderRankList(data, showRounds) {
  const list = document.getElementById('rankList');
  if (!data.length) { list.innerHTML = '<div class="rank-empty">아직 참여자가 없어요. 첫 번째로 참여해보세요!</div>'; return; }

  const medals = ['🥇','🥈','🥉'];
  const topClass = ['top1','top2','top3'];
  list.innerHTML = data.map((item, i) => `
    <div class="rank-item ${topClass[i]||''}">
      <div class="rank-pos">${i < 3 ? '' : i+1}</div>
      <div class="rank-medal">${medals[i]||''}</div>
      <div class="rank-info">
        <div class="rank-name">${item.nickname}</div>
        ${showRounds ? `<div class="rank-rounds">${item.rounds}회 참여 · 총 ${item.elapsed_seconds}초</div>` : `<div class="rank-rounds">풀이시간 ${item.elapsed_seconds}초</div>`}
      </div>
      <div class="rank-score">
        ${item.score}<small>점</small>
      </div>
    </div>
  `).join('');
}

// 초기 랭킹 로드
loadRanking('total', null);
</script>
